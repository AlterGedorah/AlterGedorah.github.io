<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Riel</title>
        <link rel="icon" href="images/Logo.png" />
        <link rel="stylesheet" href="assets/style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <div class="container-fluid bg">
            <div class="row">
                <nav
                    class="col-md-1 rounded-end-4 min-vh-100 position-fixed top-0 panels"
                ></nav>
                <div class="col-md-1 rounded-end-4 min-vh-100 top-0"></div>
                <div class="col-md-11 p-3">
                    <div class="row g-3 mb-3 d-flex align-items-stretch">
                        <div class="col-md-2 d-flex align-items-center">
                            <div
                                class="card p-2 panels h-60 d-flex align-items-center justify-content-center"
                            >
                                <img
                                    src="images/Logo.png"
                                    alt="Logo"
                                    class="img-fluid"
                                />
                            </div>
                        </div>
                        <div class="col-md-10">
                            <div class="rounded-4 p-4 panels h-100 d-flex flex-column justify-content-center">
                                <h1 class="title-header text-start">Hi!Im Riel</h1>
                                <h2 class="title-subheader text-start">Aspiring Security Analyst</h2>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3 d-flex align-items-stretch">
                        <div class="col-md-7">
                            <div
                                class="card p-4 panels h-100"
                                style="min-height: 250px"
                            >
                                <h3>Featured Project</h3>
                                <p>
                                    Big content match height with right cards.
                                </p>
                            </div>
                        </div>

                        <div class="col-md-5 d-flex flex-column gap-3">
                            <div class="card p-3 panels flex-grow-1">
                                <h5>GitHub Stats</h5>
                            </div>
                            <div class="card p-3 panels flex-grow-1">
                                <h5>Tech Stack</h5>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 d-flex align-items-stretch">
                        <div class="col-md-4">
                            <div
                                class="card p-4 panels h-100"
                                style="min-height: 180px"
                            >
                                <h4>About Me</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card p-4 panels h-100">
                                <h4>Socials</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card p-4 panels h-100">
                                <h4>Contact</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
